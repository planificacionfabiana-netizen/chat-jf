<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --me-bg: #d9fdd3; --her-bg: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg); position: fixed; width: 100%; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        
        #login-screen, #profile-modal { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 5000; flex-direction: column; }
        #profile-modal { display: none; padding: 20px; }
        
        #chat-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; flex-shrink: 0; }
        .pfp-header { width: 40px; height: 40px; border-radius: 50%; background: #eee; object-fit: cover; margin-right: 10px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 16px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--me-bg); border-bottom-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-bottom-left-radius: 2px; }
        
        .msg-info { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        #input-area { background: #f0f2f5; padding: 10px 10px 30px 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; flex-shrink: 0; }
        #message-input { flex: 1; border: none; padding: 12px 16px; border-radius: 24px; font-size: 16px; outline: none; background: white; }
        .icon-btn { background: none; border: none; font-size: 26px; cursor: pointer; padding: 0 5px; }

        #menu-multimedia { display: none; position: absolute; bottom: 85px; left: 10px; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000; padding: 10px; width: 200px; }
        .menu-opt { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; width: 80%;">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button class="btn" id="login-btn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">Entrar</button>
        </div>
    </div>

    <div id="profile-modal">
        <h3>Ajustes</h3>
        <button onclick="vaciarTodo()" style="background:#ff3b30; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; width:100%;">⚠️ VACIAR CHAT COMPLETO</button>
        <button onclick="document.getElementById('profile-modal').style.display='none'" style="margin-top:15px; background:#888; color:white; border:none; padding:12px; border-radius:8px; width:100%;">Cerrar</button>
    </div>

    <div id="chat-header">
        <img id="her-pfp" class="pfp-header" src="">
        <div style="flex:1"><b>Pareja</b></div>
        <div onclick="document.getElementById('profile-modal').style.display='flex'" style="font-size:24px">⚙️</div>
    </div>

    <div id="chat-box"></div>

    <div id="menu-multimedia">
        <label class="menu-opt">
            📷 Cámara (Foto)
            <input type="file" accept="image/*" capture="camera" id="cam-foto" style="display:none">
        </label>
        <label class="menu-opt">
            🎥 Cámara (Video)
            <input type="file" accept="video/*" capture="user" id="cam-video" style="display:none">
        </label>
        <label class="menu-opt">
            🖼️ Galería
            <input type="file" accept="image/*,video/*" id="galeria" style="display:none">
        </label>
    </div>

    <div id="input-area">
        <button class="icon-btn" onclick="toggleMenu()">➕</button>
        <input type="text" id="message-input" placeholder="Escribe aquí...">
        <button id="send-btn" class="icon-btn" style="color:var(--primary)">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, serverTimestamp, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail;

        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmail = user.email;
                document.getElementById('login-screen').style.display = 'none';
            }
        });

        // ESCUCHAR MENSAJES
        onChildAdded(ref(db, 'mensajes'), (snap) => {
            const m = snap.val(); const id = snap.key;
            const isMe = m.sender === userEmail;
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `msg ${isMe ? 'me' : 'her'}`;
            
            // BORRADO POR DOBLE TOQUE (Para ti y para ella)
            if (isMe) {
                div.ondblclick = () => { if(confirm("¿Borrar mensaje para todos?")) remove(ref(db, `mensajes/${id}`)); };
                // Para móviles que no detectan dblclick bien:
                let lastTap = 0;
                div.addEventListener('touchend', () => {
                    const now = new Date().getTime();
                    if (now - lastTap < 300) { if(confirm("¿Borrar mensaje para todos?")) remove(ref(db, `mensajes/${id}`)); }
                    lastTap = now;
                });
            }

            let content = `<span>${m.text}</span>`;
            if (m.type === 'image') content = `<img src="${m.text}" style="width:100%; border-radius:8px;">`;
            
            div.innerHTML = `${content}<div class="msg-info">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        onChildRemoved(ref(db, 'mensajes'), snap => document.getElementById(`msg-${snap.key}`)?.remove());

        // ENVIAR TEXTO
        document.getElementById('send-btn').onclick = () => {
            const i = document.getElementById('message-input');
            if (i.value.trim()) {
                push(ref(db, 'mensajes'), { sender: userEmail, text: i.value, type: 'text', timestamp: serverTimestamp() });
                i.value = '';
            }
        };

        // SUBIR MULTIMEDIA (Cámara o Galería)
        const handleFile = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'mensajes'), { sender: userEmail, text: reader.result, type: 'image', timestamp: serverTimestamp() });
                document.getElementById('menu-multimedia').style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('cam-foto').onchange = handleFile;
        document.getElementById('cam-video').onchange = handleFile;
        document.getElementById('galeria').onchange = handleFile;

        window.toggleMenu = () => {
            const m = document.getElementById('menu-multimedia');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.vaciarTodo = () => {
            if(confirm("¿BORRAR TODO EL CHAT DEFINITIVAMENTE?")) set(ref(db, 'mensajes'), {});
        };
    </script>
</body>
</html>
