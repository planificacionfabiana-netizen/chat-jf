<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --me-bg: #d9fdd3; --her-bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg); position: fixed; width: 100%; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        
        #chat-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; flex-shrink: 0; z-index: 100; }
        .pfp-header { width: 42px; height: 42px; border-radius: 50%; background: #eee; object-fit: cover; margin-right: 12px; }
        .user-info { display: flex; flex-direction: column; flex: 1; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 16px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--me-bg); border-bottom-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-bottom-left-radius: 2px; }
        .sticker-img { width: 160px; height: auto; border-radius: 10px; }

        /* AREA DE ESCRITURA BAJADA Y COMPATIBLE CON STICKERS */
        #input-area { 
            background: #f0f2f5; 
            padding: 8px 10px 45px 10px; /* Aumentado para bajar la barra */
            display: flex; 
            gap: 8px; 
            align-items: flex-end; 
            border-top: 1px solid #ddd; 
            flex-shrink: 0; 
        }

        /* DIV editable para permitir stickers pegados */
        #message-input { 
            flex: 1; 
            min-height: 40px; 
            max-height: 120px;
            padding: 10px 16px; 
            border-radius: 20px; 
            font-size: 16px; 
            outline: none; 
            background: white; 
            overflow-y: auto;
            word-break: break-word;
        }

        #message-input[placeholder]:empty:before {
            content: attr(placeholder);
            color: #888;
        }

        .icon-btn { background: none; border: none; font-size: 26px; cursor: pointer; padding-bottom: 5px; }
        
        #login-screen, #profile-modal { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 5000; flex-direction: column; }
        #profile-modal { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; width: 80%;">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Pass">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">Entrar</button>
        </div>
    </div>

    <div id="profile-modal">
        <h3>Ajustes</h3>
        <button onclick="vaciarTodo()" style="background:#ff3b30; color:white; border:none; padding:15px; border-radius:8px; width:100%;">⚠️ VACIAR CHAT</button>
        <button onclick="document.getElementById('profile-modal').style.display='none'" style="margin-top:10px; width:100%; padding:10px;">Cerrar</button>
    </div>

    <div id="chat-header">
        <img id="her-pfp" class="pfp-header" src="">
        <div class="user-info"><b id="her-name">Pareja</b><span id="her-status">En línea</span></div>
        <div onclick="document.getElementById('profile-modal').style.display='flex'" style="font-size:24px">⚙️</div>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <button class="icon-btn" onclick="document.getElementById('file-up').click()">➕</button>
        <input type="file" id="file-up" style="display:none" accept="image/*" capture="camera">
        
        <div id="message-input" contenteditable="true" placeholder="Escribe o pega un sticker..."></div>
        
        <button id="send-btn" class="icon-btn" style="color:var(--primary)">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, serverTimestamp, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail;

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmail = user.email;
                document.getElementById('login-screen').style.display = 'none';
            }
        });

        const sendMsg = (text, type) => {
            if(!text.trim() && type === 'text') return;
            push(ref(db, 'mensajes'), { sender: userEmail, text, type, timestamp: serverTimestamp() });
        };

        // ENVIAR TEXTO
        document.getElementById('send-btn').onclick = () => {
            const i = document.getElementById('message-input');
            sendMsg(i.innerText, 'text');
            i.innerText = '';
        };

        // CAPTURAR STICKERS Y PEGAR IMÁGENES
        document.getElementById('message-input').addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => sendMsg(event.target.result, 'sticker');
                    reader.readAsDataURL(blob);
                    e.preventDefault(); // Evita que se pegue el texto raro si es un sticker
                }
            }
        });

        // MANEJO DE CÁMARA
        document.getElementById('file-up').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => sendMsg(reader.result, 'image');
            reader.readAsDataURL(e.target.files[0]);
        };

        // RECIBIR MENSAJES
        onChildAdded(ref(db, 'mensajes'), (snap) => {
            const m = snap.val(); const id = snap.key; const isMe = m.sender === userEmail;
            const div = document.createElement('div');
            div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            
            // Doble toque para borrar
            let lastTap = 0;
            div.addEventListener('touchend', () => {
                const now = new Date().getTime();
                if (now - lastTap < 300) { if(confirm("¿Borrar?")) remove(ref(db, `mensajes/${id}`)); }
                lastTap = now;
            });

            let content = `<span>${m.text}</span>`;
            if (m.type === 'sticker' || m.type === 'image') content = `<img src="${m.text}" class="sticker-img">`;
            
            div.innerHTML = `${content}<div class="msg-info">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        onChildRemoved(ref(db, 'mensajes'), snap => document.getElementById(`msg-${snap.key}`)?.remove());

        window.vaciarTodo = () => { if(confirm("¿Vaciar chat?")) set(ref(db, 'mensajes'), {}); };
    </script>
</body>
</html>
