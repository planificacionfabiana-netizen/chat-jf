<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
   /* 1. Ajuste del contenedor de mensajes para que sea flexible */
.msg { 
    padding: 10px 14px; 
    border-radius: 18px; 
    max-width: 85%; /* Aumentamos un poco el margen para aprovechar la pantalla */
    width: auto; 
    font-size: 15px; 
    box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
    position: relative;
    word-wrap: break-word; /* Crucial: rompe palabras largas para que no ensanchen el chat */
    box-sizing: border-box; /* Asegura que el padding no sume al ancho total */
}

/* 2. Ajuste para Audios (que suelen ser anchos) */
.msg audio {
    max-width: 100%; /* El audio nunca será más ancho que el globo del mensaje */
    height: 35px;
    display: block;
    margin: 5px 0;
}

/* 3. Ajuste para Multimedia (Fotos/Videos) */
.media-wrapper { 
    width: 100%; /* Se adapta al ancho del globo de mensaje */
    max-width: 200px; /* Tamaño máximo sugerido para móviles */
    height: auto; 
    aspect-ratio: 1 / 1; /* Mantiene la forma cuadrada */
    background: #333; 
    border-radius: 12px; 
    overflow: hidden; 
    margin-top: 5px; 
    border: 1px solid rgba(0,0,0,0.1); 
}

.media-content { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    filter: blur(50px); 
    transform: scale(1.6); 
}

/* 4. El chat-box debe permitir el scroll y no empujar los mensajes */
#chat-box { 
    flex: 1; 
    overflow-y: auto; 
    overflow-x: hidden; /* Evita que el chat se mueva de lado a lado */
    padding: 15px 10px; /* Menos padding lateral para ganar espacio */
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    background-color: #e5ddd5; 
}
</style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-bottom: 25px; color: #333;">Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">Iniciar Sesión</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="toggleProfile(false)"></div>
    
    <div id="profile-modal">
        <h3 style="margin-top:0">Ajustes del Perfil</h3>
        <p style="font-size:12px; color:gray">Personaliza cómo te ven</p>
        <div style="margin: 20px 0; text-align: center;">
            <label for="new-pfp" style="cursor:pointer;">
                <div id="pfp-preview" style="width:80px; height:80px; border-radius:50%; background:#eee; margin:0 auto; overflow:hidden;">
                    <img id="current-pfp-edit" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <span style="font-size:12px; color:var(--primary); display:block; margin-top:8px">Cambiar foto</span>
            </label>
            <input type="file" id="new-pfp" accept="image/*" style="display:none" onchange="previewImage(this)">
        </div>
        <input type="text" id="new-name" placeholder="Nombre" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box;">
        <input type="text" id="new-status" placeholder="Estado (ej. Disponible)" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
        
        <div class="modal-footer">
            <button class="btn-primary" onclick="saveProfile()">Guardar Cambios</button>
            <button onclick="toggleProfile(false)" style="border:none; background:#eee; padding:12px; border-radius:10px; cursor:pointer; font-weight:600;">Cerrar</button>
        </div>
    </div>

    <div id="full-view" onclick="closeEphMedia()"></div>

    <div id="chat-container">
        <div id="chat-header">
            <img id="her-pfp" class="pfp-header" src="">
            <div style="flex:1; margin-left:12px">
                <b id="her-name" style="font-size:16px; color:#333">...</b><br>
                <span id="her-status" style="font-size:12px; color:#888">...</span>
            </div>
            <button class="icon-btn" onclick="toggleProfile(true)">⚙️</button>
        </div>

        <div id="chat-box"></div>
        <div id="picker-container" style="position:absolute; bottom:85px; left:10px; display:none; z-index:1000;"></div>

        <div id="menu-adjuntos" style="display:none; position:absolute; bottom:85px; left:10px; background:white; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); z-index:1000; overflow:hidden;">
            <div style="padding:15px; border-bottom:1px solid #f5f5f5; cursor:pointer;" onclick="triggerInput('image/*', true)">📸 Cámara</div>
            <div style="padding:15px; border-bottom:1px solid #f5f5f5; cursor:pointer;" onclick="triggerInput('video/*', true)">🎥 Video</div>
            <div style="padding:15px; cursor:pointer;" onclick="triggerInput('image/*,video/*', false)">🖼️ Galería</div>
        </div>

        <div id="input-area">
            <input type="file" id="universal-input" style="display:none">
            <button class="icon-btn" onclick="toggleMenu()">➕</button>
            <button class="icon-btn" id="emoji-btn">😊</button>
            <input type="text" id="message-input" placeholder="Escribe un mensaje...">
            <button class="icon-btn" id="mic-btn">🎙️</button>
            <button id="send-btn" class="icon-btn" style="color:var(--primary)">➤</button>
        </div>
    </div>

    <script src="https://unpkg.com/picmo@latest/dist/umd/index.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, serverTimestamp, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail, currentEphId = null;

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmail = user.email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                initEmojis();
                syncProfile();
            }
        });

        window.toggleProfile = (show) => {
            document.getElementById('profile-modal').classList.toggle('open', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        };

        window.previewImage = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('current-pfp-edit').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        };

        function syncProfile() {
            const uid = userEmail.replace(/\./g, '_');
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val();
                if(!data) return;
                for (let id in data) {
                    if (id !== uid) {
                        document.getElementById('her-name').innerText = data[id].name || "Pareja";
                        document.getElementById('her-status').innerText = data[id].status || "Disponible";
                        document.getElementById('her-pfp').src = data[id].pfp || "";
                    } else {
                        document.getElementById('new-name').value = data[id].name || "";
                        document.getElementById('new-status').value = data[id].status || "";
                        document.getElementById('current-pfp-edit').src = data[id].pfp || "";
                    }
                }
            });
        }

        window.saveProfile = () => {
            const uid = userEmail.replace(/\./g, '_');
            const file = document.getElementById('new-pfp').files[0];
            const updates = { name: document.getElementById('new-name').value, status: document.getElementById('new-status').value };
            
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    updates.pfp = e.target.result;
                    update(ref(db, `users/${uid}`), updates);
                };
                reader.readAsDataURL(file);
            } else { update(ref(db, `users/${uid}`), updates); }
            toggleProfile(false);
        };

        function initEmojis() {
            const p = picmo.createPicker({ rootElement: document.querySelector('#picker-container') });
            p.addEventListener('emoji:select', e => { document.getElementById('message-input').value += e.emoji; });
            document.getElementById('emoji-btn').onclick = () => {
                const pc = document.querySelector('#picker-container');
                pc.style.display = pc.style.display === 'block' ? 'none' : 'block';
                document.getElementById('menu-adjuntos').style.display = 'none';
            };
        }

        window.toggleMenu = () => {
            const m = document.getElementById('menu-adjuntos');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            document.getElementById('picker-container').style.display = 'none';
        };

        window.triggerInput = (accept, useCam) => {
            const input = document.getElementById('universal-input');
            input.accept = accept;
            if(useCam) input.setAttribute("capture", "environment");
            else input.removeAttribute("capture");
            input.click();
            toggleMenu();
        };

        document.getElementById('universal-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => sendMsg(ev.target.result, file.type.includes('video') ? 'video' : 'photo', true);
                reader.readAsDataURL(file);
            }
        };

        let recorder; let chunks = [];
        document.getElementById('mic-btn').onclick = async () => {
            if (!recorder || recorder.state === "inactive") {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s); chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const r = new FileReader();
                    r.onload = () => sendMsg(r.result, 'audio', true);
                    r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
                    document.getElementById('mic-btn').classList.remove('recording');
                };
                recorder.start(); document.getElementById('mic-btn').classList.add('recording');
            } else { recorder.stop(); }
        };

        const sendMsg = (txt, type = 'text', eph = false) => {
            if (!txt.trim()) return;
            push(ref(db, 'mensajes'), { sender: userEmail, text: txt, type: type, eph: eph, timestamp: serverTimestamp() });
        };

        document.getElementById('send-btn').onclick = () => {
            const i = document.getElementById('message-input');
            sendMsg(i.value, 'text', false); i.value = '';
        };

        onChildAdded(ref(db, 'mensajes'), (snap) => {
            const m = snap.val(); const id = snap.key; const isMe = m.sender === userEmail;
            const div = document.createElement('div');
            div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            let html = `<span>${m.text}</span>`;
            if (m.type === 'photo') {
                html = `<div class="media-wrapper"><img src="${m.text}" class="media-content" onclick="openEph('${id}','${m.text}','photo')"></div>`;
            } else if (m.type === 'video') {
                html = `<div class="media-wrapper"><video src="${m.text}" class="media-content" onclick="openEph('${id}','${m.text}','video')"></video></div>`;
            } else if (m.type === 'audio') {
                html = `<audio src="${m.text}" controls onended="deleteMsg('${id}')" style="width:180px"></audio>`;
            }
            div.innerHTML = `${html}<div style="font-size:10px; text-align:right; color:gray; margin-top:4px">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</div>`;
            if (isMe) {
                let timer;
                div.onclick = (e) => { if (e.detail === 1 && m.type === 'text') { timer = setTimeout(() => { const n = prompt("Editar:", m.text); if (n) update(ref(db, `mensajes/${id}`), { text: n }); }, 250); } };
                div.ondblclick = () => { clearTimeout(timer); if (confirm("¿Borrar mensaje?")) deleteMsg(id); };
            }
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        window.openEph = (id, url, type) => {
            currentEphId = id;
            const fv = document.getElementById('full-view');
            fv.innerHTML = type === 'photo' ? `<img src="${url}" style="max-width:100%; max-height:90%;">` : `<video src="${url}" controls autoplay style="max-width:100%; max-height:90%;"></video>`;
            fv.style.display = 'flex';
        };

        window.closeEphMedia = () => { if (currentEphId) { deleteMsg(currentEphId); currentEphId = null; } document.getElementById('full-view').style.display = 'none'; };
        window.deleteMsg = (id) => remove(ref(db, `mensajes/${id}`));
        onChildChanged(ref(db, 'mensajes'), snap => { const el = document.getElementById(`msg-${snap.key}`); if (el && snap.val().type === 'text') el.querySelector('span').innerText = snap.val().text; });
        onChildRemoved(ref(db, 'mensajes'), snap => document.getElementById(`msg-${snap.key}`)?.remove());
    </script>
</body>
</html>
