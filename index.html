<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --me-bg: #d9fdd3; --her-bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg); position: fixed; width: 100%; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        
        /* HEADER */
        #chat-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; flex-shrink: 0; z-index: 100; }
        .pfp-header { width: 42px; height: 42px; border-radius: 50%; background: #eee; object-fit: cover; margin-right: 12px; }
        .user-info { display: flex; flex-direction: column; flex: 1; }
        .user-info b { font-size: 15px; }
        .user-info span { font-size: 12px; color: #777; }

        /* PANTALLAS MODALES */
        #login-screen, #profile-modal { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 5000; flex-direction: column; }
        #profile-modal { display: none; padding: 20px; }
        .card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }

        /* CHAT BOX */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 16px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--me-bg); border-bottom-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-bottom-left-radius: 2px; }
        .sticker-img { width: 160px; height: auto; border-radius: 10px; }
        .msg-info { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        /* INPUT AREA */
        #input-area { background: #f0f2f5; padding: 10px 10px 35px 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; flex-shrink: 0; }
        #message-input { flex: 1; border: none; padding: 12px 16px; border-radius: 24px; font-size: 16px; outline: none; background: white; }
        .icon-btn { background: none; border: none; font-size: 26px; cursor: pointer; padding: 0 4px; }
        .recording { color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* MENÚ MULTIMEDIA */
        #menu-extra { display: none; position: absolute; bottom: 90px; left: 10px; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000; width: 220px; overflow: hidden; }
        .menu-opt { padding: 15px; border-bottom: 1px solid #f0f0f0; display: block; font-size: 14px; cursor: pointer; text-decoration: none; color: black; }
        .active-eph { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">Entrar</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="card">
            <h3>Mi Perfil</h3>
            <img id="my-pfp-preview" class="pfp-header" style="width:80px; height:80px; margin: 0 auto 15px auto; display:block;">
            <input type="file" id="pfp-input" accept="image/*" style="display:none">
            <button onclick="document.getElementById('pfp-input').click()" style="margin-bottom:10px;">Cambiar Foto</button>
            <input type="text" id="status-input" placeholder="Tu estado...">
            <button onclick="saveProfile()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:5px; width:100%;">Guardar</button>
            <button onclick="vaciarChat()" style="background:#ff3b30; color:white; border:none; padding:10px; border-radius:5px; width:100%; margin-top:10px;">Vaciar Chat</button>
            <button onclick="document.getElementById('profile-modal').style.display='none'" style="background:#888; color:white; border:none; padding:10px; border-radius:5px; width:100%; margin-top:10px;">Cerrar</button>
        </div>
    </div>

    <div id="chat-header">
        <img id="her-pfp" class="pfp-header" src="">
        <div class="user-info">
            <b id="her-name">Cargando...</b>
            <span id="her-status">...</span>
        </div>
        <div onclick="document.getElementById('profile-modal').style.display='flex'" style="font-size:24px; cursor:pointer">⚙️</div>
    </div>

    <div id="chat-box"></div>

    <div id="menu-extra">
        <label class="menu-opt">📷 Tomar Foto <input type="file" accept="image/*" capture="camera" id="cam-f" style="display:none"></label>
        <label class="menu-opt">🎥 Grabar Video <input type="file" accept="video/*" capture="user" id="cam-v" style="display:none"></label>
        <label class="menu-opt">🖼️ Galería <input type="file" accept="image/*,video/*" id="galeria" style="display:none"></label>
        <div class="menu-opt" onclick="toggleEph()" id="eph-label">🎙️ Audio Efímero: OFF</div>
    </div>

    <div id="input-area">
        <button class="icon-btn" onclick="toggleExtra()">➕</button>
        <input type="text" id="message-input" placeholder="Mensaje o Sticker...">
        <button id="mic-btn" class="icon-btn">🎙️</button>
        <button id="send-btn" class="icon-btn" style="color:var(--primary)">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, serverTimestamp, remove, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail, userId, pendingEph = false;

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmail = user.email; userId = user.uid;
                document.getElementById('login-screen').style.display = 'none';
                syncProfiles();
            }
        });

        // PERFILES
        function syncProfiles() {
            onValue(ref(db, 'perfiles'), (snap) => {
                const data = snap.val() || {};
                Object.keys(data).forEach(id => {
                    if (id === userId) {
                        document.getElementById('my-pfp-preview').src = data[id].photo || '';
                        document.getElementById('status-input').value = data[id].status || '';
                    } else {
                        document.getElementById('her-pfp').src = data[id].photo || '';
                        document.getElementById('her-name').innerText = data[id].name || 'Pareja';
                        document.getElementById('her-status').innerText = data[id].status || 'En línea';
                    }
                });
            });
        }

        window.saveProfile = () => {
            update(ref(db, `perfiles/${userId}`), {
                status: document.getElementById('status-input').value,
                photo: document.getElementById('my-pfp-preview').src,
                name: userEmail.split('@')[0]
            }).then(() => document.getElementById('profile-modal').style.display = 'none');
        };

        document.getElementById('pfp-input').onchange = (e) => {
            const r = new FileReader();
            r.onload = () => document.getElementById('my-pfp-preview').src = r.result;
            r.readAsDataURL(e.target.files[0]);
        };

        // ENVIAR
        const send = (text, type, eph = false) => {
            push(ref(db, 'mensajes'), { sender: userEmail, text, type, eph, timestamp: serverTimestamp() });
        };

        document.getElementById('send-btn').onclick = () => {
            const i = document.getElementById('message-input');
            if(i.value.trim()) { send(i.value, 'text'); i.value = ''; }
        };

        // STICKERS (PEGAR)
        document.getElementById('message-input').addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const reader = new FileReader();
                    reader.onload = (ev) => send(ev.target.result, 'sticker');
                    reader.readAsDataURL(items[i].getAsFile());
                }
            }
        });

        // MULTIMEDIA
        const handleF = (e, type) => {
            const r = new FileReader();
            r.onload = () => { send(r.result, type, true); document.getElementById('menu-extra').style.display='none'; };
            r.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('cam-f').onchange = (e) => handleF(e, 'image');
        document.getElementById('cam-v').onchange = (e) => handleF(e, 'video');
        document.getElementById('galeria').onchange = (e) => handleF(e, 'image');

        // AUDIO
        let recorder; let chunks = [];
        document.getElementById('mic-btn').onclick = async () => {
            if (!recorder || recorder.state === "inactive") {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s); chunks = [];
                recorder.onstop = () => {
                    const r = new FileReader();
                    r.onload = () => { send(r.result, 'audio', pendingEph); pendingEph = false; document.getElementById('eph-label').classList.remove('active-eph'); document.getElementById('eph-label').innerText = "🎙️ Audio Efímero: OFF"; };
                    r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
                    document.getElementById('mic-btn').classList.remove('recording');
                };
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.start(); document.getElementById('mic-btn').classList.add('recording');
            } else { recorder.stop(); }
        };

        // MENSAJES EN PANTALLA
        onChildAdded(ref(db, 'mensajes'), (snap) => {
            const m = snap.val(); const id = snap.key; const isMe = m.sender === userEmail;
            const div = document.createElement('div');
            div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            
            // Borrado doble toque
            let lastTap = 0;
            div.addEventListener('touchend', () => {
                const now = new Date().getTime();
                if (now - lastTap < 300) { if(confirm("¿Borrar?")) remove(ref(db, `mensajes/${id}`)); }
                lastTap = now;
            });

            let html = `<span>${m.text}</span>`;
            if (m.type === 'sticker' || m.type === 'image') html = `<img src="${m.text}" class="sticker-img">`;
            if (m.type === 'video') html = `<video src="${m.text}" controls style="width:100%; border-radius:8px;"></video>`;
            if (m.type === 'audio') html = `<audio controls src="${m.text}" style="width:180px" onended="if(${m.eph}){remove(ref(getDatabase(),'mensajes/${id}'))}"></audio>`;

            div.innerHTML = `${html}<div class="msg-info">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        onChildRemoved(ref(db, 'mensajes'), snap => document.getElementById(`msg-${snap.key}`)?.remove());

        // AUXILIARES
        window.toggleExtra = () => {
            const m = document.getElementById('menu-extra');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };
        window.toggleEph = () => {
            pendingEph = !pendingEph;
            const l = document.getElementById('eph-label');
            l.innerText = "🎙️ Audio Efímero: " + (pendingEph ? "ON" : "OFF");
            l.classList.toggle('active-eph');
        };
        window.vaciarChat = () => { if(confirm("¿Borrar todo?")) set(ref(db, 'mensajes'), {}); };
    </script>
</body>
</html>
