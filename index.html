<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { --primary: #0084ff; --me-bg: #d9fdd3; --her-bg: #ffffff; --whatsapp-green: #075e54; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e5ddd5; }
        #chat-container { display: none; flex-direction: column; height: 100dvh; width: 100%; }
        #chat-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; height: 60px; flex-shrink: 0; z-index: 100; }
        .pfp-header { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: var(--me-bg); border-top-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-top-left-radius: 2px; }
        .msg img, .msg video { filter: blur(15px); width: 150px; height: 150px; object-fit: cover; border-radius: 8px; display: block; margin-top: 5px; cursor: pointer; }
        .msg audio { width: 210px; height: 45px; margin-top: 5px; display: block; }
        
        #input-area-container { background: #f0f0f0; width: 100%; padding: 8px; box-sizing: border-box; flex-shrink: 0; }
        #input-area { display: flex; align-items: flex-end; gap: 8px; position: relative; }
        .input-pill { flex: 1; background: white; border-radius: 25px; display: flex; align-items: flex-end; padding: 2px 12px; }
        #message-input { flex: 1; border: none; padding: 10px 5px; font-size: 16px; outline: none; background: transparent; resize: none; max-height: 120px; }
        
        #right-btn { width: 45px; height: 45px; background: var(--whatsapp-green); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; border: none; flex-shrink: 0; cursor: pointer; transition: 0.2s; }
        #right-btn.recording { background: #ff3b30; transform: scale(1.2); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        #recording-status { position: absolute; left: 60px; bottom: 60px; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000; display: none; }
        #full-view { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; align-items: center; justify-content: center; }
        #menu-adjuntos { display: none; position: fixed; bottom: 80px; left: 15px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 9999; width: 160px; overflow: hidden; }
    </style>
</head>
<body>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="login-screen" style="position:fixed; inset:0; background:white; display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="text-align:center; width:85%;">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">Entrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
    <div id="full-view" onclick="closeEphMedia()"></div>
    <div id="menu-adjuntos">
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('image/*', true)">📸 Cámara</div>
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('video/*', true)">🎥 Video</div>
        <div style="padding:15px;" onclick="triggerInput('image/*,video/*', false)">🖼️ Galería</div>
    </div>

    <div id="chat-container">
        <div id="chat-header">
            <img id="her-pfp" class="pfp-header" src="">
            <div style="flex:1; margin-left:12px;"><b id="her-name">...</b></div>
        </div>
        <div id="chat-box" onclick="closeAllModals()"></div>
        <div id="input-area-container">
            <div id="recording-status">🔴 Grabando... <span id="rec-timer">00:00</span></div>
            <div id="input-area">
                <input type="file" id="universal-input" style="display:none">
                <button onclick="toggleMenu(event)" style="background:none; border:none; color:var(--whatsapp-green); font-size:28px;">㊂</button>
                <div class="input-pill">
                    <textarea id="message-input" rows="1" placeholder="Mensaje" oninput="handleTyping(this)"></textarea>
                </div>
                <button id="right-btn"><span id="main-icon">🎙️</span></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail, mediaRecorder, audioChunks = [], recordTimer;

        onAuthStateChanged(auth, u => { if(u){ userEmail=u.email; document.getElementById('login-screen').style.display='none'; document.getElementById('chat-container').style.display='flex'; syncProfile(); }});
        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);

        function syncProfile() {
            onValue(ref(db, 'users'), snap => {
                const data = snap.val(); if(!data) return;
                for(let id in data) if(id !== userEmail.replace(/\./g, '_')) {
                    document.getElementById('her-name').innerText = data[id].name || "Pareja";
                    document.getElementById('her-pfp').src = data[id].pfp || "";
                }
            });
        }

        // LÓGICA DE AUDIO Y BOTÓN DERECHO
        const rightBtn = document.getElementById('right-btn');
        const msgInput = document.getElementById('message-input');

        window.handleTyping = (el) => {
            el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
            document.getElementById('main-icon').innerText = el.value.trim() ? "➤" : "🎙️";
        };

        rightBtn.onclick = () => {
            if (msgInput.value.trim()) {
                sendMsg(msgInput.value, 'text');
                msgInput.value = ''; handleTyping(msgInput);
            } else {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    stopRecording();
                } else {
                    startRecording();
                }
            }
        };

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => sendMsg(reader.result, 'audio');
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                rightBtn.classList.add('recording');
                document.getElementById('recording-status').style.display = 'block';
                startTimer();
            } catch (err) { alert("Error al acceder al micro: " + err); }
        }

        function stopRecording() {
            mediaRecorder.stop();
            rightBtn.classList.remove('recording');
            document.getElementById('recording-status').style.display = 'none';
            clearInterval(recordTimer);
        }

        function startTimer() {
            let sec = 0;
            recordTimer = setInterval(() => {
                sec++;
                const m = Math.floor(sec/60).toString().padStart(2,'0');
                const s = (sec%60).toString().padStart(2,'0');
                document.getElementById('rec-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function sendMsg(content, type) {
            push(ref(db, 'mensajes'), { sender: userEmail, text: content, type: type, read: false, timestamp: serverTimestamp() });
        }

        // RENDERIZADO Y BORRADO (5 MINUTOS)
        onChildAdded(ref(db, 'mensajes'), snap => {
            const m = snap.val(), id = snap.key, isMe = m.sender === userEmail;
            if(!isMe && !m.read) update(ref(db, `mensajes/${id}`), { read: true, readAt: Date.now() });
            
            const div = document.createElement('div');
            div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            let html = '';
            if(m.type === 'text') html = `<span>${m.text}</span>`;
            else if(m.type === 'audio') html = `<audio controls src="${m.text}"></audio>`;
            else html = `<img src="${m.text}" onclick="openEph('${id}','${m.text}','${m.type}',${isMe})">`;
            
            div.innerHTML = `${html}<div class="status-container">${isMe ? (m.read ? '<span class="check-read">✓✓</span>' : '✓') : ''}</div>`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;

            if(m.read && m.readAt) {
                const diff = (m.readAt + 300000) - Date.now();
                setTimeout(() => remove(ref(db, `mensajes/${id}`)), Math.max(diff, 0));
            }
        });

        // MULTIMEDIA EFÍMERA
        window.openEph = (id, url, type, me) => {
            const fv = document.getElementById('full-view');
            fv.innerHTML = type === 'video' ? `<video src="${url}" autoplay controls></video>` : `<img src="${url}">`;
            fv.style.display = 'flex';
            if(!me) { // Si el receptor lo ve, se borra al cerrar
                fv.onclick = () => { remove(ref(db, `mensajes/${id}`)); fv.style.display = 'none'; };
            } else {
                fv.onclick = () => fv.style.display = 'none';
            }
        };

        window.toggleMenu = (e) => { e.stopPropagation(); document.getElementById('menu-adjuntos').style.display='block'; document.getElementById('overlay').style.display='block'; };
        window.closeAllModals = () => { document.getElementById('menu-adjuntos').style.display='none'; document.getElementById('overlay').style.display='none'; };
        window.triggerInput = (a, c) => { const i = document.getElementById('universal-input'); i.accept=a; if(c) i.setAttribute("capture","environment"); else i.removeAttribute("capture"); i.click(); closeAllModals(); };
        
        document.getElementById('universal-input').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => sendMsg(ev.target.result, f.type.includes('video') ? 'video' : 'photo');
            r.readAsDataURL(f);
        };
    </script>
</body>
</html>
