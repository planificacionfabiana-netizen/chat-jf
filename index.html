<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { 
            --primary: #0084ff; 
            --me-bg: #d9fdd3; 
            --her-bg: #ffffff; 
            --whatsapp-green: #075e54; 
        }
        
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #e5ddd5;
        }

        #chat-container { display: none; flex-direction: column; height: 100dvh; width: 100%; }
        
        #chat-header { 
            background: #fff; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            height: 60px; 
            flex-shrink: 0; 
            z-index: 100; 
        }
        .pfp-header { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain; -webkit-overflow-scrolling: touch;
        }

        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: var(--me-bg); border-top-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-top-left-radius: 2px; }

        .msg img, .msg video {
            filter: blur(15px);
            width: 150px; height: 150px;
            object-fit: cover; border-radius: 8px;
            display: block; margin-top: 5px; cursor: pointer;
        }
        
        /* Estilo para el reproductor de audio en el chat */
        .msg audio { max-width: 100%; margin-top: 5px; display: block; }

        .status-container { font-size: 10px; color: gray; margin-top: 4px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .check-read { color: #34b7f1; font-weight: bold; }
        .reaction-badge { position: absolute; bottom: -8px; right: 5px; background: white; border-radius: 10px; font-size: 12px; padding: 1px 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        #picker-container { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 400px; z-index: 9999; }
        #menu-adjuntos { display: none; position: fixed; bottom: 80px; left: 15px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 9999; width: 160px; overflow: hidden; }

        #input-area-container { background: #f0f0f0; width: 100%; padding: 8px; box-sizing: border-box; flex-shrink: 0; }
        #input-area { display: flex; align-items: flex-end; gap: 8px; }
        .input-pill { flex: 1; background: white; border-radius: 25px; display: flex; align-items: flex-end; padding: 2px 12px; }
        #message-input { flex: 1; border: none; padding: 10px 5px; font-size: 16px; outline: none; background: transparent; resize: none; max-height: 120px; }
        
        .action-icon { background: none; border: none; font-size: 24px; color: #666; cursor: pointer; padding: 8px 4px; display: flex; align-items: center; justify-content: center; }
        
        /* Animación para el botón de grabado */
        #right-btn { 
            width: 45px; height: 45px; 
            background: var(--whatsapp-green); 
            border-radius: 50%; color: white; 
            display: flex; align-items: center; justify-content: center; 
            border: none; flex-shrink: 0; 
            transition: background 0.3s, transform 0.2s;
        }
        #right-btn.recording { background: #ff3b30; transform: scale(1.1); }

        #msg-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: white; z-index: 9999; border-radius: 20px 20px 0 0; display: none; padding: 15px; box-sizing: border-box; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        #profile-modal { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100dvh; background: white; z-index: 9500; transition: 0.3s; padding: 20px; box-sizing: border-box; padding-top: calc(20px + env(safe-area-inset-top)); }
        #profile-modal.open { right: 0; }

        #full-view { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; align-items: center; justify-content: center; }
        #full-view img, #full-view video { filter: none !important; max-width: 95%; max-height: 95%; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000; display: none; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; inset:0; background:white; display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="text-align:center; width:85%;">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">Entrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
    <div id="picker-container"></div>
    <div id="menu-adjuntos">
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('image/*', true)">📸 Cámara</div>
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('video/*', true)">🎥 Video</div>
        <div style="padding:15px;" onclick="triggerInput('image/*,video/*', false)">🖼️ Galería</div>
    </div>

    <div id="msg-actions">
        <div style="display:flex; justify-content:space-around; font-size:26px; margin-bottom:20px;">
            <span onclick="react('❤️')">❤️</span><span onclick="react('😂')">😂</span><span onclick="react('😮')">😮</span><span onclick="react('😢')">😢</span><span onclick="react('🙏')">🙏</span><span onclick="react('👍')">👍</span>
        </div>
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="setReply()">↩️ Responder</div>
        <div id="edit-option" style="padding:15px; border-bottom:1px solid #eee;" onclick="editMsg()">✏️ Editar</div>
        <div style="padding:15px; color:red;" onclick="requestDelete()">🗑️ Borrar</div>
    </div>

    <div id="profile-modal">
        <h3>Mi Perfil</h3>
        <label for="new-pfp" style="display:block; text-align:center; cursor:pointer;">
            <img id="current-pfp-edit" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; background:#eee;">
            <p style="color:var(--primary); font-size:12px;">Cambiar foto</p>
        </label>
        <input type="file" id="new-pfp" accept="image/*" style="display:none" onchange="previewPfp(this)">
        <input type="text" id="new-name" placeholder="Nombre" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="new-status" placeholder="Estado" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
        <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">Guardar</button>
    </div>

    <div id="full-view" onclick="closeEphMedia()"></div>

    <div id="chat-container">
        <div id="chat-header">
            <img id="her-pfp" class="pfp-header" src="">
            <div style="flex:1; margin-left:12px; min-width:0;">
                <b id="her-name">...</b><br>
                <span id="her-status" style="font-size:11px; color:#888;">...</span>
            </div>
            <button class="action-icon" onclick="toggleProfile(true)">⁝</button> 
        </div>

        <div id="chat-box" onclick="closeAllModals()"></div>

        <div id="input-area-container">
            <div id="reply-bar" style="display:none; background:white; padding:8px 15px; border-left:4px solid var(--primary); margin-bottom:5px; border-radius:10px; font-size:13px; position:relative;">
                <div id="reply-text" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#555; padding-right:20px;"></div>
                <div onclick="cancelReply()" style="position:absolute; right:10px; top:8px; color:gray; font-weight:bold; cursor:pointer;">✕</div>
            </div>
            <div id="input-area">
                <input type="file" id="universal-input" style="display:none">
                <button class="action-icon" onclick="toggleMenu(event)" style="color:var(--whatsapp-green); font-size:28px;">㊂</button>
                <div class="input-pill">
                    <button class="action-icon" id="emoji-trigger">😊</button>
                    <textarea id="message-input" rows="1" placeholder="Mensaje" oninput="handleTyping(this)"></textarea>
                </div>
                <button id="right-btn"><span id="main-icon">🎙️</span></button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/picmo@latest/dist/umd/index.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, update, remove, onValue, onChildChanged, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Configuración de Notificación (Sonido tipo WhatsApp)
const notificationSound = new Audio('https://raw.githubusercontent.com/Aris-Tottle/Resources/main/whatsapp_notification.mp3');

let userEmail, currentEphId = null, shouldDeleteAfterView = false, selectedMsgId = null, replyMsg = null;

function alertarNuevoMensaje() {
    // Hace sonar el audio de WhatsApp
    notificationSound.play().catch(e => console.log("Audio esperando clic inicial"));
    
    // Hace vibrar el celular (200 milisegundos)
    if (navigator.vibrate) {
        navigator.vibrate(200);
    }
}
        
        // Variables para la lógica de Audio
        let mediaRecorder, audioChunks = [];

        function programarBorrado(id, data) {
            if (data.read && data.readAt) {
                const cincoMinutos = 5 * 60 * 1000;
                const tiempoRestante = (data.readAt + cincoMinutos) - Date.now();
                if (tiempoRestante <= 0) remove(ref(db, `mensajes/${id}`));
                else setTimeout(() => remove(ref(db, `mensajes/${id}`)), tiempoRestante);
            }
        }

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => alert("Error"));
        
        onAuthStateChanged(auth, user => {
            if (user) {
                userEmail = user.email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                syncProfile();
            }
        });

        window.toggleProfile = (show) => {
            document.getElementById('profile-modal').classList.toggle('open', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        };

        window.previewPfp = (input) => {
            const r = new FileReader();
            r.onload = e => document.getElementById('current-pfp-edit').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        };

        window.saveProfile = () => {
            const uid = userEmail.replace(/\./g, '_');
            update(ref(db, `users/${uid}`), {
                name: document.getElementById('new-name').value,
                status: document.getElementById('new-status').value,
                pfp: document.getElementById('current-pfp-edit').src
            }).then(() => toggleProfile(false));
        };

        function syncProfile() {
            const uid = userEmail.replace(/\./g, '_');
            onValue(ref(db, 'users'), snap => {
                const us = snap.val(); if (!us) return;
                for (let id in us) {
                    if (id === uid) {
                        document.getElementById('new-name').value = us[id].name || "";
                        document.getElementById('new-status').value = us[id].status || "";
                        document.getElementById('current-pfp-edit').src = us[id].pfp || "";
                    } else {
                        document.getElementById('her-name').innerText = us[id].name || "Pareja";
                        document.getElementById('her-pfp').src = us[id].pfp || "";
                        document.getElementById('her-status').innerText = us[id].status || "Disponible";
                    }
                }
            });
        }

        window.handleTyping = (el) => {
            el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            document.getElementById('main-icon').innerText = el.value.trim() ? "➤" : "🎙️";
        };

        // LÓGICA DE BOTÓN DERECHO (TEXTO O AUDIO)
        document.getElementById('right-btn').onclick = async () => {
            const input = document.getElementById('message-input');
            const btn = document.getElementById('right-btn');
            
            // Si hay texto, enviamos texto
            if (input.value.trim()) {
                push(ref(db, 'mensajes'), { 
                    sender: userEmail, text: input.value, type: 'text', 
                    read: false, timestamp: serverTimestamp(), reply: replyMsg, reaction: ""
                });
                input.value = ''; handleTyping(input); cancelReply();
            } 
            // Si no hay texto, manejamos grabación de audio
            else {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    btn.classList.remove('recording');
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];
                        
                        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(audioChunks, { type: 'audio/webm' });
                            const reader = new FileReader();
                            reader.readAsDataURL(blob);
                            reader.onloadend = () => {
                                push(ref(db, 'mensajes'), { 
                                    sender: userEmail, text: reader.result, type: 'audio', 
                                    read: false, timestamp: serverTimestamp(), reaction: "" 
                                });
                            };
                            stream.getTracks().forEach(track => track.stop());
                        };
                        
                        mediaRecorder.start();
                        btn.classList.add('recording');
                    } catch (err) {
                        alert("No se pudo acceder al micrófono.");
                    }
                }
            }
        };

       onChildAdded(ref(db, 'mensajes'), snap => {
    const m = snap.val(); const id = snap.key; const isMe = m.sender === userEmail;
    
    if (!isMe && !m.read) {
        update(ref(db, `mensajes/${id}`), { read: true, readAt: Date.now() });
        alertarNuevoMensaje(); // <-- Esta es la chispa que hace sonar y vibrar
    }
    
    renderMsg(m, id, isMe);
    programarBorrado(id, m);
});

        function renderMsg(m, id, isMe) {
            const div = document.createElement('div');
            div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            let html = m.reply ? `<div style="background:rgba(0,0,0,0.05); padding:5px; border-left:3px solid var(--primary); border-radius:4px; font-size:12px; margin-bottom:5px;">${m.reply.text}</div>` : '';
            
            if (m.type === 'text') html += `<span>${m.text}</span>`;
            else if (m.type === 'photo') html += `<img src="${m.text}" onclick="openEph('${id}','${m.text}','photo', ${isMe})">`;
            else if (m.type === 'video') html += `<video src="${m.text}" onclick="openEph('${id}','${m.text}','video', ${isMe})"></video>`;
            else if (m.type === 'audio') html += `<audio controls src="${m.text}"></audio>`;
            
            const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `${html}<div class="status-container">${time} ${isMe ? (m.read ? '<span class="check-read">✓✓</span>' : '✓') : ''}</div><div class="reaction-badge" style="display:${m.reaction?'block':'none'}">${m.reaction||''}</div>`;
            div.onclick = (e) => { e.stopPropagation(); openMsgActions(id, isMe, m.text, m.type); };
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        window.openMsgActions = (id, isMe, text, type) => {
            selectedMsgId = id; window.currentMsgText = text;
            document.getElementById('edit-option').style.display = (isMe && type === 'text') ? 'block' : 'none';
            document.getElementById('msg-actions').style.display = 'block';
            document.getElementById('overlay').style.display = 'block'; 
        };

        window.react = (emoji) => { update(ref(db, `mensajes/${selectedMsgId}`), { reaction: emoji }); closeAllModals(); };
        window.setReply = () => { replyMsg = { text: window.currentMsgText }; document.getElementById('reply-bar').style.display = 'block'; document.getElementById('reply-text').innerText = window.currentMsgText; closeAllModals(); };
        window.cancelReply = () => { replyMsg = null; document.getElementById('reply-bar').style.display = 'none'; };
        window.editMsg = () => { const n = prompt("Editar:", window.currentMsgText); if(n) update(ref(db, `mensajes/${selectedMsgId}`), {text:n}); closeAllModals(); };
        window.requestDelete = () => { if(confirm("¿Eliminar?")) remove(ref(db, `mensajes/${selectedMsgId}`)); closeAllModals(); };

        onChildChanged(ref(db, 'mensajes'), snap => {
            const m = snap.val(); const el = document.getElementById(`msg-${snap.key}`);
            if (el) {
                const rb = el.querySelector('.reaction-badge');
                if(rb) { rb.innerText = m.reaction || ''; rb.style.display = m.reaction ? 'block' : 'none'; }
                const status = el.querySelector('.status-container');
                if(status && m.sender === userEmail && m.read) {
                    if(!status.innerHTML.includes('check-read')) status.innerHTML = status.innerHTML.replace('✓', '<span class="check-read">✓✓</span>');
                }
            }
            programarBorrado(snap.key, m);
        });

        onChildRemoved(ref(db, 'mensajes'), snap => document.getElementById(`msg-${snap.key}`)?.remove());

        window.openEph = (id, url, type, sentByMe) => { 
            currentEphId = id; shouldDeleteAfterView = !sentByMe;
            const fv = document.getElementById('full-view'); 
            fv.innerHTML = type==='photo' ? `<img src="${url}">` : `<video src="${url}" autoplay controls></video>`; 
            fv.style.display = 'flex'; 
        };

        window.closeEphMedia = () => { 
            if(currentEphId && shouldDeleteAfterView) remove(ref(db, `mensajes/${currentEphId}`)); 
            document.getElementById('full-view').style.display = 'none'; 
        };

        window.toggleMenu = (e) => { e.stopPropagation(); document.getElementById('menu-adjuntos').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
        window.closeAllModals = () => { 
            document.getElementById('menu-adjuntos').style.display = 'none'; 
            document.getElementById('picker-container').style.display = 'none'; 
            document.getElementById('msg-actions').style.display = 'none'; 
            document.getElementById('profile-modal').classList.remove('open');
            document.getElementById('overlay').style.display = 'none'; 
        };
        
        window.triggerInput = (acc, cam) => { 
            const i = document.getElementById('universal-input'); 
            i.accept = acc; if(cam) i.setAttribute("capture", "environment"); else i.removeAttribute("capture");
            i.click(); closeAllModals(); 
        };

        document.getElementById('universal-input').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => push(ref(db, 'mensajes'), { sender: userEmail, text: ev.target.result, type: f.type.includes('video') ? 'video' : 'photo', read: false, timestamp: serverTimestamp() });
            r.readAsDataURL(f);
        };

        const picker = picmo.createPicker({ rootElement: document.querySelector('#picker-container') });
        picker.addEventListener('emoji:select', e => {
            const input = document.getElementById('message-input');
            input.value += e.emoji; 
            handleTyping(input);
        });
        document.getElementById('emoji-trigger').onclick = (e) => { e.stopPropagation(); document.getElementById('picker-container').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    </script>
</body>
</html>
