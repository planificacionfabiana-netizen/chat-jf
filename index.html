<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Privado JF</title>
    <style>
        :root { --primary: #0084ff; --me-bg: #d9fdd3; --her-bg: #ffffff; --whatsapp-green: #075e54; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e5ddd5; }
        #chat-container { display: none; flex-direction: column; height: 100dvh; width: 100%; }
        #chat-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; height: 60px; flex-shrink: 0; z-index: 100; }
        .pfp-header { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        
        /* ESTILO MULTIMEDIA EFÍMERA */
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: var(--me-bg); border-top-right-radius: 2px; }
        .her { align-self: flex-start; background: var(--her-bg); border-top-left-radius: 2px; }
        
        /* Miniatura difuminada */
        .msg img, .msg video { 
            filter: blur(15px); 
            width: 150px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 8px; 
            display: block; 
            margin-top: 5px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .msg audio { width: 210px; height: 45px; margin-top: 5px; display: block; }
        
        .status-container { font-size: 10px; color: gray; margin-top: 4px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .check-read { color: #34b7f1; font-weight: bold; }
        
        #input-area-container { background: #f0f0f0; width: 100%; padding: 8px; box-sizing: border-box; flex-shrink: 0; }
        #input-area { display: flex; align-items: flex-end; gap: 8px; }
        .input-pill { flex: 1; background: white; border-radius: 25px; display: flex; align-items: flex-end; padding: 2px 12px; }
        #message-input { flex: 1; border: none; padding: 10px 5px; font-size: 16px; outline: none; background: transparent; resize: none; max-height: 120px; }
        #right-btn { width: 45px; height: 45px; background: var(--whatsapp-green); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; border: none; flex-shrink: 0; cursor: pointer; font-size: 20px; }
        
        /* Pantalla Completa */
        #full-view { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; align-items: center; justify-content: center; }
        #full-view img, #full-view video { filter: none !important; max-width: 100%; max-height: 100%; }
        
        #menu-adjuntos { display: none; position: fixed; bottom: 80px; left: 15px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 9999; width: 180px; overflow: hidden; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000; display: none; }
    </style>
</head>
<body>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="login-screen" style="position:fixed; inset:0; background:white; display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="text-align:center; width:85%;">
            <h2>Chat Privado JF</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">Entrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>

    <div id="menu-adjuntos">
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('image/*', true)">📸 Cámara</div>
        <div style="padding:15px; border-bottom:1px solid #eee;" onclick="triggerInput('video/*', true)">🎥 Video</div>
        <div style="padding:15px;" onclick="triggerInput('image/*,video/*,audio/*', false)">🖼️ Abrir Galería</div>
    </div>

    <div id="full-view" onclick="closeEphMedia()"></div>

    <div id="chat-container">
        <div id="chat-header">
            <img id="her-pfp" class="pfp-header" src="">
            <div style="flex:1; margin-left:12px;">
                <b id="her-name">...</b><br>
                <span id="her-status" style="font-size:11px; color:#888;">...</span>
            </div>
        </div>
        <div id="chat-box" onclick="closeAllModals()"></div>
        <div id="input-area-container">
            <div id="input-area">
                <input type="file" id="universal-input" style="display:none">
                <button onclick="toggleMenu(event)" style="background:none; border:none; font-size:28px; color:var(--whatsapp-green); cursor:pointer;">㊂</button>
                <div class="input-pill">
                    <textarea id="message-input" rows="1" placeholder="Mensaje" oninput="handleTyping(this)"></textarea>
                </div>
                <button id="right-btn" onclick="handleRightBtn()"><span id="main-icon">🎙️</span></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8VllGmeJ2FEKISxaUD1zqpvhYlmRH54k",
            authDomain: "chat-jf-1705d.firebaseapp.com",
            databaseURL: "https://chat-jf-1705d-default-rtdb.firebaseio.com",
            projectId: "chat-jf-1705d",
            storageBucket: "chat-jf-1705d.firebasestorage.app",
            messagingSenderId: "89345173921",
            appId: "1:89345173921:web:82f0865cbe34bf3d1cc3e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail, currentEphId = null, shouldDeleteAfterView = false;

        onAuthStateChanged(auth, u => {
            if(u) {
                userEmail = u.email;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('chat-container').style.display='flex';
                syncProfile();
            }
        });

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(()=>alert("Acceso denegado"));

        function syncProfile() {
            onValue(ref(db, 'users'), snap => {
                const data = snap.val();
                for(let id in data) {
                    if(id !== userEmail.replace(/\./g, '_')) {
                        document.getElementById('her-name').innerText = data[id].name || "Pareja";
                        document.getElementById('her-pfp').src = data[id].pfp || "";
                        document.getElementById('her-status').innerText = data[id].status || "En línea";
                    }
                }
            });
        }

        // Lógica de 5 minutos
        function programarBorrado(id, data) {
            if (data.readAt) {
                const tiempoVencimiento = data.readAt + (5 * 60 * 1000);
                const espera = tiempoVencimiento - Date.now();
                setTimeout(() => remove(ref(db, `mensajes/${id}`)), Math.max(espera, 0));
            }
        }

        window.handleTyping = (el) => {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            document.getElementById('main-icon').innerText = el.value.trim() ? "➤" : "🎙️";
        };

        window.handleRightBtn = () => {
            const input = document.getElementById('message-input');
            if(input.value.trim()) {
                push(ref(db, 'mensajes'), { sender: userEmail, text: input.value, type: 'text', read: false, timestamp: serverTimestamp() });
                input.value = ''; handleTyping(input);
            } else {
                triggerInput('audio/*', false);
            }
        };

        onChildAdded(ref(db, 'mensajes'), snap => {
            const m = snap.val(); const id = snap.key; const isMe = m.sender === userEmail;
            if(!isMe && !m.read) {
                update(ref(db, `mensajes/${id}`), { read: true, readAt: Date.now() });
            }
            renderMsg(m, id, isMe);
            if(m.read && m.readAt) programarBorrado(id, m);
        });

        function renderMsg(m, id, isMe) {
            const div = document.createElement('div'); div.id = `msg-${id}`; div.className = `msg ${isMe ? 'me' : 'her'}`;
            let html = '';
            if(m.type === 'text') html = `<span>${m.text}</span>`;
            else if(m.type === 'audio') html = `<audio controls src="${m.text}"></audio>`;
            else if(m.type === 'video') html = `<video src="${m.text}" onclick="openEph('${id}','${m.text}', 'video', ${isMe})"></video>`;
            else html = `<img src="${m.text}" onclick="openEph('${id}','${m.text}', 'photo', ${isMe})">`;

            const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `${html}<div class="status-container">${time} ${isMe ? (m.read ? '<span class="check-read">✓✓</span>' : '✓') : ''}</div>`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        // Multimedia efímera
        window.openEph = (id, url, type, me) => { 
            currentEphId = id; 
            shouldDeleteAfterView = !me; // Solo borra si el que lo ve es el receptor
            const fv = document.getElementById('full-view'); 
            fv.innerHTML = type==='photo' ? `<img src="${url}">` : `<video src="${url}" autoplay controls></video>`; 
            fv.style.display='flex'; 
        };

        window.closeEphMedia = () => { 
            if(currentEphId && shouldDeleteAfterView) {
                remove(ref(db, `mensajes/${currentEphId}`));
            }
            document.getElementById('full-view').style.display='none'; 
        };

        window.triggerInput = (a, c) => { 
            const i = document.getElementById('universal-input'); 
            i.accept = a; 
            if(c) i.setAttribute("capture", "environment"); else i.removeAttribute("capture"); 
            i.click(); 
            closeAllModals(); 
        };

        document.getElementById('universal-input').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); 
            r.onload = ev => {
                let t = f.type.split('/')[0];
                if(!['image','video','audio'].includes(t)) t = 'photo';
                if(t === 'image') t = 'photo';
                push(ref(db, 'mensajes'), { sender: userEmail, text: ev.target.result, type: t, read: false, timestamp: serverTimestamp() });
            };
            r.readAsDataURL(f);
        };

        window.toggleMenu = (e) => { e.stopPropagation(); document.getElementById('menu-adjuntos').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
        window.closeAllModals = () => { document.getElementById('menu-adjuntos').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; };
    </script>
</body>
</html>
